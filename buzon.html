<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón de Ideas | EPET 6</title>
    <meta name="description" content="Buzón de sugerencias e ideas del Centro de Estudiantes de la EPET 6.">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Componentes Compartidos -->
    <script type="module" src="js/components.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .slide-up {
            opacity: 0;
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bg-lista-azul {
            background-color: #1d4ed8;
        }

        .text-lista-azul {
            color: #1d4ed8;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased flex flex-col min-h-screen">

    <div id="header-container"></div>

    <!-- Contenido Principal -->
    <main class="flex-grow w-full max-w-5xl mx-auto px-4 py-16">

        <!-- Buzón de Ideas -->
        <section id="buzon" class="slide-up">
            <div
                class="bg-white rounded-3xl shadow-xl p-8 md:p-10 border border-gray-100 max-w-3xl mx-auto relative overflow-hidden">
                <!-- Decoración visual -->
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -z-10"></div>

                <div class="text-center mb-8">
                    <span
                        class="inline-block py-1 px-3 rounded-full bg-blue-100 text-blue-700 text-xs font-bold uppercase tracking-wider mb-3">Tu
                        voz importa</span>
                    <h2 class="text-3xl font-bold text-gray-900">Buzón de Sugerencias</h2>
                    <p class="text-gray-500 mt-3 text-sm md:text-base">Dejanos tu sugerencia, queja o propuesta. Podés
                        hacerlo de forma anónima, o dejarnos un medio de contacto si querés que te respondamos.</p>
                </div>

                <form id="form-sugerencias" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre o Apodo <span
                                    class="text-gray-400 font-normal">(Opcional)</span></label>
                            <div class="relative">
                                <div
                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                    <i class="fa-regular fa-user"></i>
                                </div>
                                <input type="text" id="nombre"
                                    class="w-full pl-10 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                                    placeholder="Ej: Juan">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Curso / Año</label>
                            <div class="relative">
                                <div
                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                    <i class="fa-solid fa-chalkboard-user"></i>
                                </div>
                                <input type="text" id="curso"
                                    class="w-full pl-10 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                                    placeholder="Ej: 4to B">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Medio de Contacto <span
                                class="text-gray-400 font-normal">(Opcional - para responderte)</span></label>
                        <div class="relative">
                            <div
                                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-brands fa-instagram"></i>
                            </div>
                            <input type="text" id="contacto"
                                class="w-full pl-10 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                                placeholder="Ej: @tu_instagram o mail.">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Tu Mensaje <span
                                class="text-red-500">*</span></label>
                        <textarea id="mensaje" required rows="5"
                            class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none"
                            placeholder="Escribí acá tu idea, reclamo o qué te gustaría mejorar en la escuela..."></textarea>
                    </div>

                    <div class="flex items-start bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <div class="flex items-center h-5">
                            <input id="hacer-publico" type="checkbox"
                                class="w-5 h-5 text-blue-600 bg-white border-gray-300 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer transition-all">
                        </div>
                        <label for="hacer-publico" class="ms-3 text-sm font-medium text-blue-900 cursor-pointer">
                            Quiero que esta idea se publique de forma <strong>anónima</strong> para que otros alumnos la
                            voten.
                        </label>
                    </div>

                    <button type="submit" id="btn-submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all duration-300 flex justify-center items-center shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-0.5">
                        <i class="fa-regular fa-paper-plane mr-2"></i> Enviar Mensaje al Centro
                    </button>

                </form>
            </div>
        </section>

    </main>

    <div id="footer-container"></div>

    <!-- Lógica Webhook, Firebase & Anti-Spam -->
    <script type="module">
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { db } from "./js/firebase-config.js";

        // Obfuscación básica (Base64) del Token y Chat ID para evitar rastreadores simples
        const ENCODED_BOT_TOKEN = "ODc4NTE1NTA5MTpBQUVaREg2QklXWFh4YzNvYklvTTNhcXZjQkxldnk1NFlnOA==";
        const ENCODED_CHAT_ID = "LTUxODcyNTczNjk=";
        const ENCODED_DISCORD_WEBHOOK = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTUxMTIwMjk5Mzg4MDQzNjg0Ni9XMGpfTlBtMXlGRHVXQ1RzdDZlZHZmOTZqZTdLX1RBZThLeDhBZlZqMFNfdUU1cGxQSHh6Q3NwY3VGRHFpMnVWS2N5Rg==";

        // Tiempo de espera entre mensajes (Cooldown) - 1 minuto (60000 ms)
        // Tiempo de espera entre mensajes (Cooldown) - 3 minutos
        const COOLDOWN_MINUTES = 3;

        document.getElementById('form-sugerencias').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btnSubmit = document.getElementById('btn-submit');

            // --- Verificación de Cooldown (Anti-Spam Básico) ---
            const lastTime = localStorage.getItem('last_suggestion_time');
            if (lastTime) {
                const diffMs = Date.now() - parseInt(lastTime);
                const diffMins = Math.floor(diffMs / 60000);
                if (diffMins < COOLDOWN_MINUTES) {
                    window.Toast.fire({
                        icon: 'warning',
                        title: `Por favor espera ${COOLDOWN_MINUTES - diffMins} minutos antes de enviar otro mensaje.`
                    });
                    return;
                }
            }

            // Recopilar datos
            const nombre = document.getElementById('nombre').value.trim() || "Anónimo";
            const curso = document.getElementById('curso').value.trim() || "No especificado";
            const contacto = document.getElementById('contacto').value.trim() || "No proporcionado";
            const mensaje = document.getElementById('mensaje').value.trim();
            const checkboxPublico = document.getElementById('hacer-publico').checked;
            const hacerPublico = checkboxPublico ? "✅ SÍ (Publicar Anónimo)" : "❌ NO";

            if (mensaje.length < 5) {
                window.Toast.fire({
                    icon: 'error',
                    title: "El mensaje es muy corto. Escribí un poco más."
                });
                return;
            }

            // UI Feedback
            btnSubmit.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Enviando...';
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-75', 'cursor-not-allowed');

            // Formatear mensaje para Telegram (Texto plano para evitar errores con caracteres raros)
            const textMessage = `📨 NUEVO MENSAJE - LISTA AZUL\n\n` +
                `👤 De: ${nombre}\n` +
                `🏫 Curso: ${curso}\n` +
                `📱 Contacto: ${contacto}\n` +
                `📢 Votación Pública: ${hacerPublico}\n\n` +
                `📝 Mensaje:\n${mensaje}`;

            // Payload de Telegram
            const payloadTelegram = {
                chat_id: atob(ENCODED_CHAT_ID),
                text: textMessage
            };

            // Payload de Discord
            const payloadDiscord = {
                content: null,
                embeds: [{
                    title: "📨 Nueva Sugerencia / Mensaje",
                    description: "Se ha recibido un nuevo mensaje desde la web.",
                    color: 1920472, // Azul
                    fields: [
                        { name: "👤 Estudiante", value: nombre, inline: true },
                        { name: "🏫 Curso", value: curso, inline: true },
                        { name: "📱 Contacto", value: contacto, inline: true },
                        { name: "📢 Votación Pública", value: hacerPublico, inline: true },
                        { name: "📝 Mensaje", value: mensaje }
                    ],
                    footer: { text: "Buzón Web Lista Azul EPET 6" },
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const telegramToken = atob(ENCODED_BOT_TOKEN);
                const telegramUrl = `https://api.telegram.org/bot${telegramToken}/sendMessage`;
                const discordUrl = atob(ENCODED_DISCORD_WEBHOOK);

                // Enviar a Telegram y Discord en paralelo
                const promesas = [
                    fetch(telegramUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payloadTelegram)
                    }),
                    fetch(discordUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payloadDiscord)
                    })
                ];

                // Si marcó la casilla, agregar la subida a Firebase a las promesas
                if (checkboxPublico) {
                    const tituloAuto = curso !== "No especificado" ? `Sugerencia de Alumno (${curso})` : "Sugerencia de Alumno";
                    promesas.push(
                        addDoc(collection(db, "propuestas"), {
                            titulo: tituloAuto,
                            descripcion: mensaje,
                            votos: 0,
                            votedBy: [],
                            timestamp: Date.now()
                        })
                    );
                }

                const resultados = await Promise.all(promesas);
                const resTelegram = resultados[0];
                const resDiscord = resultados[1];

                if (resTelegram.ok && resDiscord.ok) {
                    // Éxito: Guardar tiempo en localStorage y mostrar mensaje
                    localStorage.setItem('last_suggestion_time', Date.now().toString());
                    window.Toast.fire({
                        icon: 'success',
                        title: '¡Mensaje enviado con éxito! Gracias por sumar tu voz.'
                    });
                    document.getElementById('form-sugerencias').reset();
                } else {
                    throw new Error("Respuesta no OK de Telegram o Discord");
                }
            } catch (error) {
                console.error(error);
                window.Toast.fire({
                    icon: 'error',
                    title: 'Hubo un error al enviar. Intentá de nuevo en unos minutos.'
                });
            } finally {
                // Restaurar botón
                btnSubmit.innerHTML = '<i class="fa-regular fa-paper-plane mr-2"></i> Enviar Mensaje al Centro';
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>

</html>
